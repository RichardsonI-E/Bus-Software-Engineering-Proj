name: Firestore CI/CD

on:
  workflow_dispatch: # allows you to trigger manually
  push:
    branches:
      - main

jobs:
  run-java-app:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # Step 2: Set up Java
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Step 3: Write Firebase key from secret to a file
      - name: Write Firebase key
        run: |
          echo "${{ secrets.FIREBASEKEY }}" > firebase-key.json

      # Step 4: Compile/run your Java app
      - name: Run Java App
        run: |
          javac -cp ".:libs/*" src/Main.java
          java -cp ".:libs/*" Main